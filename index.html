    color:white;
    background:#1b3f34;
    scroll-behavior:smooth;
}

/* FONDO PREMIUM */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08), transparent 40%),

}

nav a{
    color:white;
    text-decoration:none;
    font-weight:600;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hero img{
    width:340px;
    max-width:85%;
    background:white;
    padding:14px;
    border-radius:18px;
    margin-bottom:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.hero h1{
    font-size:3.2rem;
    margin:10px 0;
    letter-spacing:1px;
}

.hero p{
    max-width:800px;
    font-size:1.2rem;
    opacity:0.95;
    line-height:1.6;
}

/* BOTÓN */
.btn{
    margin-top:25px;
    padding:12px 25px;
    background:#c8a96a;
    color:#1b3f34;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;

/* FOOTER */
footer{

    padding:35px;
